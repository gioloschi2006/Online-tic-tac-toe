<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tris Online</title>
    <script src="https://unpkg.com/playroomkit/dist/playroomkit.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .main-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: max-content; margin: 20px auto; background: #333; padding: 10px; border-radius: 8px; }
        .local-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 5px; background: #444; border-radius: 4px; position: relative; }
        .cell { width: 40px; height: 40px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
        .active-board { background: rgba(46, 204, 113, 0.3); }
        .won-X::after { content: 'X'; color: #ff4757; position: absolute; font-size: 3rem; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; background: rgba(0,0,0,0.6); }
        .won-O::after { content: 'O'; color: #2e97ff; position: absolute; font-size: 3rem; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; background: rgba(0,0,0,0.6); }
    </style>
</head>
<body>
    <h1>Ultimate Tris Online</h1>
    <div id="status">Caricamento Multiplayer...</div>
    <div id="board" class="main-board"></div>

    <script>
        // Verifichiamo se Playroom è caricato correttamente
        window.onload = async () => {
            try {
                await Playroom.insertCoin({ gameId: "tris-test-univoque-999" });
                setupGame();
            } catch (e) {
                document.getElementById('status').innerText = "Errore: " + e.message;
            }
        };

        function setupGame() {
            if (Playroom.isHost()) {
                Playroom.setState("bigBoard", Array(9).fill(null));
                Playroom.setState("smallBoards", Array(9).fill(null).map(() => Array(9).fill(null)));
                Playroom.setState("turn", "X");
                Playroom.setState("activeBoard", null);
            }
            Playroom.onStorageUpdate(render);
            render();
        }

        function render() {
            const bigBoard = Playroom.getState("bigBoard") || Array(9).fill(null);
            const smallBoards = Playroom.getState("smallBoards") || Array(9).fill(null).map(() => Array(9).fill(null));
            const turn = Playroom.getState("turn");
            const activeBoard = Playroom.getState("activeBoard");
            
            document.getElementById('status').innerText = "Tocca a: " + turn;
            const container = document.getElementById('board');
            container.innerHTML = '';

            for (let i = 0; i < 9; i++) {
                const bDiv = document.createElement('div');
                bDiv.className = 'local-board';
                if (bigBoard[i]) bDiv.classList.add('won-' + bigBoard[i]);
                if (activeBoard === i || (activeBoard === null && !bigBoard[i])) bDiv.classList.add('active-board');

                for (let j = 0; j < 9; j++) {
                    const cDiv = document.createElement('div');
                    cDiv.className = 'cell';
                    cDiv.innerText = smallBoards[i][j] || '';
                    if (!smallBoards[i][j] && !bigBoard[i] && (activeBoard === i || activeBoard === null)) {
                        cDiv.onclick = () => {
                            smallBoards[i][j] = turn;
                            // Controllo veloce vincita quadrante
                            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                            if (lines.some(l => smallBoards[i][l[0]] && smallBoards[i][l[0]] === smallBoards[i][l[1]] && smallBoards[i][l[0]] === smallBoards[i][l[2]])) {
                                bigBoard[i] = turn;
                            }
                            Playroom.setState("smallBoards", smallBoards);
                            Playroom.setState("bigBoard", bigBoard);
                            Playroom.setState("activeBoard", bigBoard[j] ? null : j);
                            Playroom.setState("turn", turn === "X" ? "O" : "X");
                        };
                    }
                    bDiv.appendChild(cDiv);
                }
                container.appendChild(bDiv);
            }
        }
    </script>
</body>
</html>
