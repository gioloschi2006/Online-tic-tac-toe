<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tris Online</title>
    <script src="https://cdn.jsdelivr.net/npm/playroomkit/dist/playroomkit.js"></script>
    <style>
        :root {
            --bg: #1a1a1a;
            --cell-bg: #2a2a2a;
            --text: #ffffff;
            --x-color: #ff4757;
            --o-color: #2e97ff;
            --active-bg: rgba(46, 204, 113, 0.2);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); text-align: center; margin: 0; padding: 20px; }
        .status { font-size: 1.1rem; margin: 15px 0; padding: 10px; background: #333; border-radius: 5px; display: inline-block; min-width: 200px; }
        
        .main-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: max-content;
            margin: 0 auto;
            padding: 12px;
            background: #333;
            border-radius: 8px;
        }

        .local-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            padding: 6px;
            background: #444;
            border-radius: 4px;
            position: relative;
        }

        .active-board { background: var(--active-bg); box-shadow: 0 0 10px rgba(46, 204, 113, 0.4); }

        .cell {
            width: 42px;
            height: 42px;
            background: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
        }

        .cell.X { color: var(--x-color); }
        .cell.O { color: var(--o-color); }

        .local-board.won-X::after, .local-board.won-O::after {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; background: rgba(26, 26, 26, 0.85); z-index: 5;
            border-radius: 4px;
        }
        .local-board.won-X::after { content: 'X'; color: var(--x-color); }
        .local-board.won-O::after { content: 'O'; color: var(--o-color); }
    </style>
</head>
<body>

    <h1>Ultimate Tris Multiplayer</h1>
    <div id="status" class="status">Verifica connessione...</div>
    <div id="board" class="main-board"></div>

    <script>
        // Funzione per controllare che la libreria sia caricata prima di iniziare
        function checkAndStart() {
            if (typeof Playroom !== 'undefined') {
                initGame();
            } else {
                document.getElementById('status').innerText = "Download moduli in corso...";
                setTimeout(checkAndStart, 1000);
            }
        }

        async function initGame() {
            try {
                // Inserisci un Game ID unico per la tua stanza
                await Playroom.insertCoin({ 
                    gameId: "tris-estremo-gioloschi-unique-2026",
                    discord: false 
                });

                if (Playroom.isHost()) {
                    Playroom.setState("bigBoard", Array(9).fill(null));
                    Playroom.setState("smallBoards", Array(9).fill(null).map(() => Array(9).fill(null)));
                    Playroom.setState("activeBoard", null);
                    Playroom.setState("turn", "X");
                }

                const players = Playroom.getPlayers();
                const mySymbol = players.indexOf(Playroom.myPlayer()) === 0 ? "X" : "O";
                Playroom.myPlayer().setState("symbol", mySymbol);

                Playroom.onStorageUpdate(render);
                render();
            } catch (e) {
                document.getElementById('status').innerText = "Errore: " + e.message;
            }
        }

        function render() {
            const turn = Playroom.getState("turn") || "X";
            const mySymbol = Playroom.myPlayer().getState("symbol");
            const statusDiv = document.getElementById('status');
            
            statusDiv.innerHTML = `Sei: <b style="color:${mySymbol === 'X' ? 'var(--x-color)' : 'var(--o-color)'}">${mySymbol}</b> | Turno: <b>${turn}</b>`;
            
            const container = document.getElementById('board');
            container.innerHTML = '';

            const bigBoard = Playroom.getState("bigBoard") || Array(9).fill(null);
            const smallBoards = Playroom.getState("smallBoards") || Array(9).fill(null).map(() => Array(9).fill(null));
            const activeBoard = Playroom.getState("activeBoard");

            for (let i = 0; i < 9; i++) {
                const bDiv = document.createElement('div');
                bDiv.className = 'local-board';
                if (bigBoard[i]) bDiv.classList.add('won-' + bigBoard[i]);
                if (activeBoard === i || (activeBoard === null && !bigBoard[i])) bDiv.classList.add('active-board');

                for (let j = 0; j < 9; j++) {
                    const cDiv = document.createElement('div');
                    cDiv.className = 'cell ' + (smallBoards[i][j] || '');
                    cDiv.innerText = smallBoards[i][j] || '';
                    
                    if (!smallBoards[i][j] && !bigBoard[i] && (activeBoard === i || activeBoard === null) && turn === mySymbol) {
                        cDiv.onclick = () => {
                            smallBoards[i][j] = turn;
                            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                            if (lines.some(l => smallBoards[i][l[0]] && smallBoards[i][l[0]] === smallBoards[i][l[1]] && smallBoards[i][l[0]] === smallBoards[i][l[2]])) {
                                bigBoard[i] = turn;
                            }
                            Playroom.setState("smallBoards", smallBoards);
                            Playroom.setState("bigBoard", bigBoard);
                            Playroom.setState("activeBoard", bigBoard[j] ? null : j);
                            Playroom.setState("turn", turn === "X" ? "O" : "X");
                        };
                    }
                    bDiv.appendChild(cDiv);
                }
                container.appendChild(bDiv);
            }
        }

        // Avvio procedura
        window.onload = checkAndStart;
    </script>
</body>
</html>
